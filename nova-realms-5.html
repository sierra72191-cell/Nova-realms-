<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NOVA REALMS · ATMOSPHERIC INTELLIGENCE NODE NETWORK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --orange: #ff6a00;
    --orange-dim: #cc4400;
    --orange-glow: #ff8c00;
    --green: #00ff41;
    --green-dim: #00cc33;
    --green-dark: #003300;
    --gold: #d4a017;
    --gold-bright: #ffd700;
    --bg: #000000;
    --text: #e8e0d0;
    --text-dim: #888070;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.012) 2px, rgba(0,255,65,0.012) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* SOUND BUTTON */
  #soundBtn {
    position: fixed;
    top: 12px; right: 12px;
    z-index: 1000;
    background: transparent;
    border: 1.5px solid var(--orange);
    color: var(--orange);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #soundBtn.active { background: var(--orange); color: #000; box-shadow: 0 0 20px var(--orange); }

  /* HEADER */
  .header {
    text-align: center;
    padding: 60px 20px 16px;
    background: radial-gradient(ellipse at 50% 0%, rgba(212,160,23,0.15) 0%, transparent 70%);
  }

  .header-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    letter-spacing: 5px;
    color: var(--green-dim);
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s forwards;
  }

  .header-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(52px, 15vw, 80px);
    font-weight: 900;
    line-height: 0.9;
    background: linear-gradient(135deg, #ffd700 0%, #d4a017 40%, #ff6a00 70%, #ff8c00 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(212,160,23,0.6));
    opacity: 0;
    animation: fadeUp 0.8s 0.4s forwards, titlePulse 4s 1.5s infinite, glitch 9s 4s infinite;
  }

  .header-tagline {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    letter-spacing: 5px;
    color: var(--text-dim);
    margin-top: 8px;
    opacity: 0;
    animation: fadeUp 0.8s 0.6s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes titlePulse {
    0%,100% { filter: drop-shadow(0 0 30px rgba(212,160,23,0.6)); }
    50% { filter: drop-shadow(0 0 50px rgba(255,140,0,0.9)); }
  }
  @keyframes glitch {
    0%,89%,100% { transform: none; }
    90% { transform: translate(-2px,1px); filter: drop-shadow(-2px 0 #f00) drop-shadow(2px 0 #0ff); }
    92% { transform: translate(2px,-1px); filter: drop-shadow(2px 0 #f00) drop-shadow(-2px 0 #0ff); }
    94% { transform: none; filter: drop-shadow(0 0 30px rgba(212,160,23,0.6)); }
    95% { transform: translate(-1px,2px); }
    97% { transform: none; }
  }

  /* GENESIS BLOCK */
  .genesis-block {
    text-align: center;
    padding: 20px 20px 10px;
    opacity: 0;
    animation: fadeUp 0.8s 0.8s forwards;
  }

  .genesis-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    letter-spacing: 5px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .genesis-number {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(60px, 18vw, 100px);
    font-weight: 900;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 40px rgba(255,255,255,0.3);
    animation: countPulse 2s infinite;
  }

  @keyframes countPulse {
    0%,100% { text-shadow: 0 0 40px rgba(255,255,255,0.3); }
    50% { text-shadow: 0 0 60px rgba(255,255,255,0.6), 0 0 100px rgba(212,160,23,0.3); }
  }

  /* DATE DISPLAY — NEW */
  .date-display {
    margin: 0 16px 6px;
    background: rgba(0,40,0,0.4);
    border: 1px solid rgba(0,255,65,0.25);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    opacity: 0;
    animation: fadeUp 0.8s 0.9s forwards;
  }

  .date-day {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    color: var(--green);
    letter-spacing: 2px;
  }

  .date-full {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-align: right;
  }

  .date-time {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    color: var(--orange-glow);
    letter-spacing: 2px;
    margin-top: 2px;
  }

  /* STATUS BAR */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 8px 20px;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--orange);
    opacity: 0;
    animation: fadeUp 0.8s 1s forwards;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--orange);
    animation: blink 1.5s infinite;
  }

  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

  .progress-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green-dim), transparent);
    margin: 0;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.8s 1.1s forwards;
  }

  .progress-line::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    animation: scan 2s linear infinite;
  }

  @keyframes scan { to { left: 100%; } }

  /* SECTIONS */
  .section { padding: 0 16px 12px; opacity: 0; animation: fadeUp 0.8s forwards; }

  .section-label {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--green-dim);
    margin-bottom: 10px;
  }
  .section-label::before { content: '+ '; color: var(--green); }
  .section-label::after { content: ' *'; color: var(--green); }

  /* INPUTS */
  .search-group { display: flex; gap: 8px; margin-bottom: 10px; }

  .search-input {
    flex: 1;
    background: rgba(0,40,0,0.6);
    border: 1px solid rgba(0,255,65,0.3);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 15px 16px;
    outline: none;
    transition: all 0.2s;
    -webkit-appearance: none;
    border-radius: 0;
  }
  .search-input::placeholder { color: rgba(0,255,65,0.3); }
  .search-input:focus { border-color: var(--green); background: rgba(0,60,0,0.7); box-shadow: 0 0 15px rgba(0,255,65,0.15); }

  .go-btn {
    background: linear-gradient(135deg, #8b6000, #5a3d00);
    border: 1px solid var(--gold);
    color: var(--gold-bright);
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 15px 16px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 70px;
  }
  .go-btn:active { background: var(--gold); color: #000; transform: scale(0.97); }

  /* BUTTONS */
  .big-btn {
    width: 100%;
    padding: 18px;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
  }
  .big-btn:active { transform: scale(0.98); }

  .btn-location {
    background: #00ff41;
    color: #000;
    font-weight: 900;
    box-shadow: 0 0 30px rgba(0,255,65,0.4), inset 0 0 30px rgba(0,255,65,0.1);
  }
  .btn-location:active { background: #00cc33; }

  .btn-territory {
    background: linear-gradient(135deg, #1a0d00, #2d1800);
    border: 1.5px solid var(--orange-dim);
    color: var(--orange-glow);
  }
  .btn-territory:active { background: var(--orange-dim); color: #000; }

  /* NEW: TERRITORY MAP FULL BUTTON */
  .btn-map-full {
    background: linear-gradient(135deg, #000d1a, #001a2d);
    border: 1.5px solid #00aaff;
    color: #00ccff;
    font-size: 12px;
  }
  .btn-map-full:active { background: #00aaff; color: #000; }

  .btn-secondary {
    background: rgba(0,10,0,0.8);
    border: 1px solid rgba(0,255,65,0.2);
    color: var(--green-dim);
    font-size: 11px;
  }
  .btn-secondary:active { border-color: var(--green); color: var(--green); }

  /* WEATHER PANEL */
  #weatherPanel {
    display: none;
    background: rgba(0,15,0,0.9);
    border: 1px solid rgba(0,255,65,0.4);
    padding: 16px;
    margin-bottom: 10px;
    position: relative;
  }

  #weatherPanel::before {
    content: 'ATMOSPHERIC DATA';
    position: absolute;
    top: 8px; right: 12px;
    font-size: 8px;
    letter-spacing: 3px;
    color: rgba(0,255,65,0.25);
  }

  .weather-header { font-family:'Orbitron',sans-serif; font-size:11px; letter-spacing:3px; color:var(--green); margin-bottom:10px; }
  .weather-location { font-size:17px; color:#fff; margin-bottom:4px; }
  .weather-temp { font-family:'Orbitron',sans-serif; font-size:48px; font-weight:900; color:var(--orange-glow); line-height:1; margin:6px 0; }
  .weather-condition { font-size:12px; color:var(--gold); letter-spacing:2px; }

  .weather-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
  .weather-stat { background:rgba(0,40,0,0.5); padding:10px; border-left:2px solid var(--green-dim); }
  .weather-stat-label { font-size:8px; letter-spacing:3px; color:var(--text-dim); margin-bottom:4px; }
  .weather-stat-value { font-family:'Orbitron',sans-serif; font-size:16px; color:var(--green); }

  .weather-loading { text-align:center; color:var(--green-dim); font-size:11px; letter-spacing:3px; padding:20px; animation:blink 1.5s infinite; }

  /* NODE MAP */
  .map-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(0,5,0,0.9);
    border: 1px solid rgba(255,106,0,0.3);
    border-bottom: none;
    margin: 0 16px;
  }

  .map-title { font-family:'Orbitron',sans-serif; font-size:10px; letter-spacing:3px; color:var(--orange); display:flex; align-items:center; gap:8px; }
  .map-controls { display:flex; gap:10px; align-items:center; }
  .map-pill { font-size:9px; letter-spacing:2px; padding:4px 10px; border:1px solid rgba(255,255,255,0.2); color:var(--text-dim); cursor:pointer; background:transparent; font-family:'Share Tech Mono',monospace; transition:all 0.2s; }
  .live-dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); animation:blink 1.5s infinite; }
  .live-label { font-size:9px; letter-spacing:2px; color:var(--green); }

  #nodeMap { height:300px; width:calc(100% - 32px); margin:0 16px; border:1px solid rgba(255,106,0,0.3); border-top:none; background:#0a0800; }

  .node-cards { display:grid; grid-template-columns:1fr 1fr; margin:0 16px; border:1px solid rgba(255,106,0,0.3); border-top:1px solid rgba(255,106,0,0.2); }
  .node-card { padding:12px; border-right:1px solid rgba(255,106,0,0.2); }
  .node-card:last-child { border-right:none; }
  .node-card-label { font-size:8px; letter-spacing:3px; color:var(--text-dim); margin-bottom:4px; }
  .node-card-name { font-family:'Orbitron',sans-serif; font-size:11px; color:var(--orange-glow); margin-bottom:6px; letter-spacing:1px; }
  .node-card-addr { font-size:10px; color:var(--text-dim); line-height:1.5; margin-bottom:8px; }

  .node-status { display:inline-flex; align-items:center; gap:5px; font-size:9px; letter-spacing:2px; padding:4px 8px; border:1px solid; }
  .status-active { border-color:var(--green); color:var(--green); background:rgba(0,255,65,0.1); }
  .status-deployed { border-color:var(--orange); color:var(--orange); background:rgba(255,106,0,0.1); }

  .node-bridge-info { display:flex; justify-content:space-around; padding:10px; font-size:9px; letter-spacing:2px; border:1px solid rgba(255,106,0,0.3); border-top:none; margin:0 16px; background:rgba(0,0,0,0.5); }
  .bridge-stat span { color:var(--orange-glow); }

  /* WIND */
  .wind-section { margin:0 16px; border:1px solid rgba(0,255,65,0.2); background:rgba(0,5,0,0.9); overflow:hidden; cursor:pointer; }
  .wind-header { padding:16px; display:flex; align-items:center; justify-content:center; gap:12px; font-family:'Orbitron',sans-serif; font-size:11px; letter-spacing:4px; color:var(--green-dim); }
  .wind-particles { height:55px; position:relative; overflow:hidden; background:rgba(0,0,0,0.3); }

  /* SATELLITE / HOME */
  .satellite-section { margin:10px 16px; border:1px solid rgba(0,255,65,0.15); padding:16px; display:flex; align-items:center; justify-content:center; gap:12px; font-family:'Orbitron',sans-serif; font-size:11px; letter-spacing:3px; color:rgba(0,255,65,0.5); cursor:pointer; transition:all 0.2s; }
  .satellite-section:active { color:var(--green); border-color:var(--green); }

  .home-btn { margin:10px 16px; border:1px solid rgba(0,255,65,0.1); padding:14px; display:flex; align-items:center; justify-content:center; gap:10px; font-size:10px; letter-spacing:3px; color:rgba(0,255,65,0.3); cursor:pointer; background:transparent; width:calc(100% - 32px); font-family:'Share Tech Mono',monospace; transition:all 0.2s; }
  .home-btn:active { color:var(--green); border-color:var(--green); }

  .footer { padding:30px 16px 20px; text-align:center; font-size:9px; letter-spacing:3px; color:rgba(255,255,255,0.1); border-top:1px solid rgba(0,255,65,0.08); margin-top:20px; }

  /* MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:5000; flex-direction:column; }
  .modal-overlay.open { display:flex; }
  .modal-inner { flex:1; display:flex; flex-direction:column; overflow:hidden; }

  .modal-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(0,5,0,0.95);
    border-bottom: 1px solid rgba(255,106,0,0.3);
    flex-shrink: 0;
  }

  .modal-topbar-title { font-family:'Orbitron',sans-serif; font-size:12px; letter-spacing:3px; color:var(--orange-glow); }

  .modal-close-btn {
    background: transparent;
    border: 1px solid var(--orange);
    color: var(--orange);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 7px 13px;
    cursor: pointer;
  }
  .modal-close-btn:active { background:var(--orange); color:#000; }

  #territoryMap { flex:1; min-height:0; }

  .modal-footer {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(3,1fr);
    border-top: 1px solid rgba(255,106,0,0.2);
    background: rgba(0,5,0,0.95);
  }

  .modal-stat { padding:10px 8px; text-align:center; border-right:1px solid rgba(255,106,0,0.15); }
  .modal-stat:last-child { border-right:none; }
  .modal-stat-label { font-size:7px; letter-spacing:2px; color:var(--text-dim); margin-bottom:3px; }
  .modal-stat-value { font-family:'Orbitron',sans-serif; font-size:13px; color:var(--orange-glow); }

  /* Leaflet dark */
  .leaflet-container { background:#0a0800 !important; }
  .leaflet-tile { filter:invert(1) hue-rotate(180deg) brightness(0.65) saturate(0.7); }
  .leaflet-control-attribution { display:none !important; }
  .leaflet-control-zoom a { background:rgba(0,15,0,0.9) !important; border-color:rgba(255,106,0,0.4) !important; color:var(--orange) !important; }

  .leaflet-popup-content-wrapper { background:rgba(0,10,0,0.97) !important; border:1px solid var(--orange) !important; border-radius:0 !important; color:var(--text) !important; box-shadow:0 0 20px rgba(255,106,0,0.3) !important; }
  .leaflet-popup-tip { background:var(--orange) !important; }
  .popup-title { font-family:'Orbitron',sans-serif; font-size:11px; color:var(--orange-glow); letter-spacing:2px; margin-bottom:6px; }
  .popup-detail { font-size:11px; color:var(--text-dim); line-height:1.6; }
  .popup-status { font-size:10px; letter-spacing:2px; margin-top:6px; }
  .popup-status.active { color:var(--green); }
  .popup-status.deployed { color:var(--orange); }

  /* Stagger delays */
  .s1{animation-delay:1.2s} .s2{animation-delay:1.35s} .s3{animation-delay:1.5s}
  .s4{animation-delay:1.65s} .s5{animation-delay:1.8s} .s6{animation-delay:1.95s} .s7{animation-delay:2.1s}
</style>
</head>
<body>

<button id="soundBtn" onclick="toggleSound()">♪ SOUND</button>

<!-- HEADER -->
<div class="header">
  <div class="header-sub">ATMOSPHERIC INTELLIGENCE · NODE NETWORK</div>
  <div class="header-title">NOVA<br>REALMS</div>
  <div class="header-tagline">REAL-TIME ENVIRONMENTAL TELEMETRY</div>
</div>

<!-- GENESIS -->
<div class="genesis-block">
  <div class="genesis-label">DAYS SINCE GENESIS</div>
  <div class="genesis-number" id="genesisCount">—</div>
</div>

<!-- DATE DISPLAY -->
<div class="date-display">
  <div>
    <div class="date-day" id="dateDayName">—</div>
    <div class="date-full" id="dateFullStr">—</div>
  </div>
  <div style="text-align:right;">
    <div class="date-time" id="dateClock">—</div>
    <div style="font-size:8px;letter-spacing:2px;color:var(--text-dim);margin-top:2px;">LOCAL TIME</div>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot"></div>
  <span id="statusText">SYNCHRONIZING</span>
  <div class="status-dot"></div>
</div>
<div class="progress-line"></div>

<!-- SEARCH -->
<div class="section s1" style="margin-top:16px;">
  <div class="section-label">SEARCH LOCATION</div>

  <div class="search-group">
    <input class="search-input" id="cityInput" type="text" placeholder="City name..." />
    <button class="go-btn" id="cityGoBtn" onclick="searchCity()">GO →</button>
  </div>

  <div class="search-group">
    <input class="search-input" id="coordInput" type="text" placeholder="Coordinates – lat, lon" />
    <button class="go-btn" onclick="searchCoords()">GO →</button>
  </div>
</div>

<!-- LOCATION BUTTON -->
<div class="section s2" style="padding-top:0;">
  <button class="big-btn btn-location" id="locBtn" onclick="useMyLocation()">
    ◆ USE MY LOCATION
  </button>
</div>

<!-- WEATHER PANEL -->
<div style="padding:0 16px 10px;" id="weatherPanelWrap">
  <div id="weatherPanel">
    <div class="weather-loading" id="weatherLoading">ACQUIRING ATMOSPHERIC DATA...</div>
    <div id="weatherData" style="display:none;">
      <div class="weather-header">◈ ATMOSPHERIC STATUS REPORT</div>
      <div class="weather-location" id="wLocation">—</div>
      <div class="weather-temp" id="wTemp">—°F</div>
      <div class="weather-condition" id="wCondition">—</div>
      <div class="weather-grid">
        <div class="weather-stat"><div class="weather-stat-label">HUMIDITY</div><div class="weather-stat-value" id="wHumidity">—</div></div>
        <div class="weather-stat"><div class="weather-stat-label">WIND</div><div class="weather-stat-value" id="wWind">—</div></div>
        <div class="weather-stat"><div class="weather-stat-label">FEELS LIKE</div><div class="weather-stat-value" id="wFeels">—</div></div>
        <div class="weather-stat"><div class="weather-stat-label">PRESSURE</div><div class="weather-stat-value" id="wPressure">—</div></div>
      </div>
    </div>
  </div>
</div>

<!-- TERRITORY MAP BUTTON -->
<div class="section s3" style="padding-top:0;">
  <button class="big-btn btn-territory" onclick="openTerritoryMap()">
    ◈ TERRITORY MAP · GRID EXPANSION
  </button>
  <!-- NEW: dedicated full territory button -->
  <button class="big-btn btn-map-full" onclick=
